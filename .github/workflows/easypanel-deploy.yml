name: Deploy to Easypanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy
        env:
          EASYPANEL_DEPLOY_WEBHOOK_URL: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$EASYPANEL_DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing EASYPANEL_DEPLOY_WEBHOOK_URL repository secret."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            "$EASYPANEL_DEPLOY_WEBHOOK_URL"
